name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: python -m pip install -r requirements.txt
      - run: python -m pytest
      - run: npm ci
      - run: npm run check:js
